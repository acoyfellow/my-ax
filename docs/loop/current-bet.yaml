id: walk-away-completion-2026-w26
user: single operator who leaves My AX while delegated, scheduled, or recovery work continues
problem: terminal or blocked work can be missed, falsely acknowledged, or require transcript inspection to understand what happened
outcome: every relevant run or human decision ends in one authoritative owner-visible receipt with a truthful terminal state and next action
metric:
  numerator: terminal sampled runs and decisions with a correct actionable owner-visible receipt
  denominator: all terminal sampled delegated runs, recurring-job runs, recovery attempts, and human decisions
  baseline: measure from production receipts during the first daily evidence review
  target: ">= 95% for three consecutive daily samples"
sources:
  - owner Attention receipts
  - run and job event receipts
  - decision delivery outcomes
  - stalled-turn recovery and exhaustion events
  - direct authenticated dogfood journeys
exclusions:
  - federation or A2A
  - broad dashboard redesign
  - generic workflow DSL
  - new execution surfaces
expires_at: 2026-06-30
stop_conditions:
  - target sustained through a production release soak
  - evidence disproves the user problem
  - two interventions fail to improve the metric
  - a higher-priority production or security incident replaces the bet
