version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cloudflare-agent-runtime:
        patterns:
          - "@cloudflare/*"
          - "agents"
          - "workers-ai-provider"
          - "wrangler"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
